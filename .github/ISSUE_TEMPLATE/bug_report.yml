name: Bug report
description: Report a bug or unexpected behavior
title: '[BUG] '
labels: bug
assignees: ''
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please provide as much detail as possible.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Before submitting, please verify:
      options:
        - label: I have searched for existing issues
          required: true
        - label: I'm using the latest version of Tabula Lens
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: reproduction-link
    attributes:
      label: Minimal Reproduction
      description: |
        Please provide a link to a minimal reproduction (CodeSandbox, StackBlitz, etc.).
        This helps us fix bugs much faster.
      placeholder: https://codesandbox.io/...
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Tabula Lens Version
      description: What version are you using?
      placeholder: 0.3.0
    validations:
      required: true

  - type: input
    id: react-version
    attributes:
      label: React Version
      description: What version of React are you using?
      placeholder: 18.2.0
    validations:
      required: true

  - type: dropdown
    id: framework
    attributes:
      label: Framework
      description: What framework are you using?
      options:
        - Next.js
        - Vite
        - React Router
        - Gatsby
        - create-react-app
        - Other
    validations:
      required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue Type
      description: What type of issue is this?
      options:
        - Code bug
        - Documentation issue
        - Both code and documentation
      default: 0
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or error messages
    validations:
      required: false

  - type: textarea
    id: documentation-details
    attributes:
      label: Documentation Details (if applicable)
      description: If this is a documentation issue, please describe the documentation problem
      placeholder: What documentation is incorrect or missing?
      render: markdown
    validations:
      required: false
