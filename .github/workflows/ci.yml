name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Set explicit permissions for security
permissions:
  contents: read
  pull-requests: read
  checks: write
  statuses: write

jobs:
  # Detect which packages changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.filter.outputs.node }}
      react: ${{ steps.filter.outputs.react }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            node:
              - 'packages/node/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            react:
              - 'packages/react/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            docs:
              - 'apps/docs/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'

  # Validate Node.js package
  node:
    needs: changes
    if: ${{ needs.changes.outputs.node == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @tabula-lens/node run check-types

      - name: Lint
        run: pnpm --filter @tabula-lens/node run lint

      - name: Test
        run: pnpm --filter @tabula-lens/node run test

      - name: Build
        run: pnpm --filter @tabula-lens/node run build

  # Validate React package
  react:
    needs: changes
    if: ${{ needs.changes.outputs.react == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @tabula-lens/react run check-types

      - name: Lint
        run: pnpm --filter @tabula-lens/react run lint

      - name: Test
        run: pnpm --filter @tabula-lens/react run test

      - name: Build
        run: pnpm --filter @tabula-lens/react run build

  # Validate documentation
  docs:
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @tabula-lens/docs run check-types

      - name: Build
        run: pnpm --filter @tabula-lens/docs run build

      - name: Check for broken internal links
        run: |
          # Use a simple Node.js script to check for broken internal links
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          const distDir = 'apps/docs/dist';
          
          // Recursively find all HTML files
          function findHtmlFiles(dir, files = []) {
            const entries = fs.readdirSync(dir, { withFileTypes: true });
            for (const entry of entries) {
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                findHtmlFiles(fullPath, files);
              } else if (entry.name.endsWith('.html')) {
                files.push(fullPath);
              }
            }
            return files;
          }
          
          const htmlFiles = findHtmlFiles(distDir);
          let brokenLinks = [];
          
          htmlFiles.forEach(filePath => {
            const content = fs.readFileSync(filePath, 'utf8');
            const dir = path.dirname(filePath);
            const relativePath = path.relative(distDir, filePath);
            
            // Find all href attributes
            const hrefRegex = /href=\"([^\"]+)\"/g;
            let match;
            
            while ((match = hrefRegex.exec(content)) !== null) {
              const link = match[1];
              
              // Skip external links, anchors, and mailto
              if (link.startsWith('http') || link.startsWith('#') || link.startsWith('mailto:')) {
                continue;
              }
              
              // Resolve the target path
              let targetPath = path.resolve(dir, link);
              
              // Handle directory paths (append index.html)
              if (!link.endsWith('.html') && !link.includes('.')) {
                targetPath = path.join(targetPath, 'index.html');
              }
              
              // Check if file exists
              if (!fs.existsSync(targetPath)) {
                brokenLinks.push(\`In \${relativePath}: \${link}\`);
              }
            }
          });
          
          if (brokenLinks.length > 0) {
            console.error('Broken internal links found:');
            brokenLinks.forEach(link => console.error('  -', link));
            process.exit(1);
          } else {
            console.log('No broken internal links found.');
          }
          "
        continue-on-error: true