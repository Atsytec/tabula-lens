name: Code Quality

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Set explicit permissions for security
permissions:
  contents: read
  pull-requests: write

jobs:
  # Detect which packages changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.filter.outputs.node }}
      react: ${{ steps.filter.outputs.react }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            node:
              - 'packages/node/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            react:
              - 'packages/react/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'

  # Lint Node.js package
  node-lint:
    needs: changes
    if: ${{ needs.changes.outputs.node == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @tabula-lens/node run lint

      - name: Format check
        run: pnpm --filter @tabula-lens/node exec prettier --check "**/*.{ts,tsx,js,jsx,json,md}"

  # Lint React package
  react-lint:
    needs: changes
    if: ${{ needs.changes.outputs.react == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @tabula-lens/react run lint

      - name: Format check
        run: pnpm --filter @tabula-lens/react exec prettier --check "**/*.{ts,tsx,js,jsx,json,md}"